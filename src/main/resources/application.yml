server:
  port: 8080

spring:
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/BANK_REST_DB}"
    username: "${DB_USERNAME:postgres}"
    password: "${DB_PASSWORD:postgres}"

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  data:
    web:
      pageable:
        default-page-size: 5
        max-page-size: 50

jwt:
  secret: "${JWT_SECRET:92304174cf5f376e4100aa041c62fb1a3c2ac272bf4cfc0ab6645e5e0abdcc84}"
  expiration: 3600000

encryption:
  secret: "${ENCRYPTION_SECRET:x7kD9mPq2wL5sR8vY1nB4cF6gH0jK3lA}"

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    org.springframework.security: INFO
    com.example.bankcards: INFO
