databaseChangeLog:
  - changeSet:
      id: 003-create-cards-table
      author: vitaliy
      preConditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: cards
      changes:
        - createTable:
            tableName: cards
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_cards
                    nullable: false

              - column:
                  name: card_number
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: last_four
                  type: VARCHAR(4)
                  constraints:
                    nullable: false

              - column:
                  name: owner_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: created_by_admin_id
                  type: BIGINT
                  constraints:
                    nullable: false

              - column:
                  name: creation_time
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false

              - column:
                  name: expiration_date
                  type: DATE
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: balance
                  type: NUMERIC(38, 2)
                  defaultValueNumeric: "0"
                  constraints:
                    nullable: false

              - column:
                  name: version
                  type: BIGINT

        - addUniqueConstraint:
            tableName: cards
            columnNames: card_number
            constraintName: uk_cards_card_number

        - addForeignKeyConstraint:
            baseTableName: cards
            baseColumnNames: owner_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_cards_owner
            onDelete: RESTRICT
            onUpdate: RESTRICT

        - addForeignKeyConstraint:
            baseTableName: cards
            baseColumnNames: created_by_admin_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_cards_created_by_admin
            onDelete: RESTRICT
            onUpdate: RESTRICT

      rollback:
        - dropTable:
            tableName: cards
            cascadeConstraints: true
