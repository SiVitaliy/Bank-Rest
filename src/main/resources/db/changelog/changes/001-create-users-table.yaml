databaseChangeLog:
  - changeSet:
      id: 001-create-users-table
      author: vitaliy

      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_users
                    nullable: false

              - column:
                  name: creation_time
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false

              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: role
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: username
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

              - column:
                  name: enabled
                  type: BOOLEAN
                  constraints:
                    nullable: false

        - sql:
            sql: >
              ALTER TABLE users
              ADD CONSTRAINT users_role_check
              CHECK (role IN ('USER', 'ADMIN'));

        - addUniqueConstraint:
            tableName: users
            columnNames: username
            constraintName: uk_users_username

      rollback:
        - dropTable:
            tableName: users
            cascadeConstraints: true
