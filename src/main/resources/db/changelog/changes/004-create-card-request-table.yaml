databaseChangeLog:
  - changeSet:
      id: 004-create-card-request-table
      author: vitaliy

      changes:
        - createTable:
            tableName: card_request
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_card_request
                    nullable: false

              - column:
                  name: creation_time
                  type: TIMESTAMP(6)
                  constraints:
                    nullable: false

              - column:
                  name: request_type
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: status
                  type: VARCHAR(20)
                  constraints:
                    nullable: false

              - column:
                  name: updated_at
                  type: TIMESTAMP(6)

              - column:
                  name: card_id
                  type: BIGINT

              - column:
                  name: processed_by
                  type: BIGINT

              - column:
                  name: requester_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - sql:
            sql: >
              ALTER TABLE card_request
              ADD CONSTRAINT card_request_request_type_check
              CHECK (request_type IN ('ISSUE', 'BLOCK', 'ACTIVATE', 'DELETE'));

        - sql:
            sql: >
              ALTER TABLE card_request
              ADD CONSTRAINT card_request_status_check
              CHECK (status IN ('PENDING', 'APPROVED', 'REJECTED'));

        - addForeignKeyConstraint:
            baseTableName: card_request
            baseColumnNames: card_id
            referencedTableName: cards
            referencedColumnNames: id
            constraintName: fk_card_request_card
            onDelete: SET NULL

        - addForeignKeyConstraint:
            baseTableName: card_request
            baseColumnNames: processed_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_card_request_processed_by

        - addForeignKeyConstraint:
            baseTableName: card_request
            baseColumnNames: requester_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_card_request_requester

      rollback:
        - dropTable:
            tableName: card_request
            cascadeConstraints: true
